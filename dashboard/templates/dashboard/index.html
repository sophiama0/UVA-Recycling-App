{% extends "base_bootstrap.html" %}

{% load socialaccount %}

{% block content %}
<h1>Dashboard Page</h1>
{% if user.is_authenticated %}
    <p>You are logged in as {{ display_name }}</p>
    <p>
        <a href="{% url 'account_profile' %}"><button>Profile</button></a>
        {% if user.is_staff or user.is_superuser %}
            <a href="admin/"><button>Admin dashboard</button></a>
        {% endif %}
    </p>
    <a href="{% url 'account_logout' %}"><button>Log Out</button></a>
{% else %}
    <p>You are not logged in</p>
    <p><a href="{% provider_login_url 'google' %}"><button>Log in</button></a></p>
{% endif %}
{% endblock %}
