{% extends 'recycling/base.html' %}

{% block content %}
<h1>Chat with {{ other_user.username }}</h1>

  <div>
    {% for msg in messages %}
      <p><strong>{{ msg.sender.username }}:</strong> {{ msg.content }} <em>{{ msg.timestamp }}</em></p>
    {% endfor %}
  </div>

  <form method="POST">
    {% csrf_token %}
    <input type="text" name="content" placeholder="Type your message..." required>
    <button type="submit">Send</button>
  </form>
{% endblock %}
