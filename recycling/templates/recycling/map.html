<!-- templates/bins/map.html -->
<!DOCTYPE html>
<html>
<head>
    <title>Recycling Bins Map</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.3/dist/leaflet.css"/>

    <style>
        #map {
            height: 600px;
            width: 100%;
        }
    </style>
</head>
<body>

<h1>Recycling Bins Near You</h1>
<div id="map"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.3/dist/leaflet.js"></script>

<script>
// Initialize map
var map = L.map('map').setView([40.0, -95.0], 4);  // Default center (USA)

// Tile layer using OpenStreetMap
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
}).addTo(map);

// Fetch bin data from backend
fetch("/bins/api/bins/")
    .then(res => res.json())
    .then(data => {
        data.bins.forEach(bin => {
            L.marker([bin.lat, bin.lng])
                .addTo(map)
                .bindPopup(`<b>${bin.name}</b><br>${bin.description}`);
        });
    });
</script>

</body>
</html>
