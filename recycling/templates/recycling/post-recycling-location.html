{% extends 'recycling/base.html' %}

{% block content %}
<div class="container mt-4">
    <h1>Post a Recycling Location</h1>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">Post Location</button>
        <a href="{% url 'recycling-map' %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
            function (pos) {
                let lat = pos.coords.latitude;
                let lng = pos.coords.longitude;

                // Trim to max 9 total digits with 6 decimal places
                // This matches the model's DecimalField(max_digits=9, decimal_places=6)
                lat = parseFloat(lat.toFixed(6));
                lng = parseFloat(lng.toFixed(6));

                // Auto-fill the Django form fields
                let latInput = document.getElementById("id_latitude");
                let lngInput = document.getElementById("id_longitude");

                if (latInput && lngInput) {
                    latInput.value = lat;
                    lngInput.value = lng;
                } else {
                    console.warn("Latitude/Longitude fields not found in form.");
                }
            },
            function (err) {
                console.warn("Unable to get location:", err);
            }
        );
    }
});
</script>
{% endblock %}
